# Пороги, лимиты, модели. Все этапы читают этот файл через src/utils.py.

models:
  # Дневные лимиты бесплатного Groq считаются ПО КАЖДОЙ МОДЕЛИ отдельно,
  # поэтому работу делим: сильная модель — на умственное (кластеризация,
  # брифы), лёгкая с большим лимитом — на массовое (тема каждого видео,
  # KZ-классификация). Актуальный список: https://console.groq.com/docs/models
  llm: openai/gpt-oss-120b          # кластеризация, поисковые запросы, брифы
  llm_light: llama-3.1-8b-instant   # темы по видео, KZ-классификация
  max_tokens_default: 4000
  # у gpt-oss-120b минутный лимит 8000 токенов НА ВЕСЬ запрос (вход+выход),
  # поэтому бриф: ~4.5k входа + 3k на ответ
  max_tokens_brief: 3000
  # gpt-oss — reasoning-модель: low не даёт рассуждениям съесть max_tokens
  # (при medium/high на кластеризации финальный ответ приходил пустым)
  reasoning_effort: low
  # Пауза между НЕкэшированными вызовами, сек — бесплатный тариф Groq
  # ограничен по запросам в минуту; SDK сам ретраит 429, пауза снижает шум.
  sleep_between_calls: 2.0

harvest:
  months_back: 12            # берём видео за последние N месяцев
  max_videos_per_vertical: 150
  # Потолок на один канал: без него первые каналы списка съедают весь лимит
  # вертикали, а до остальных (в т.ч. US-доноров) сбор не доходит.
  max_videos_per_channel: 12
  playlist_scan_limit: 80    # сколько последних видео канала просматривать
  sleep_requests: 1          # yt-dlp --sleep-requests, иначе временный бан по IP
  stop_after_old: 8          # прекращаем сканить канал после N подряд старых видео

scoring:
  hit_outlier_score: 2.0     # порог "хита"; подобрать по факту после первого прогона

subtitles:
  languages: [ru, en]

transcribe:
  # large-v3 в режиме int8_float16 занимает ~3 ГБ VRAM — влезает в 4-гиговую
  # RTX 3050. Если этап падает с out of memory — поставь medium.
  model: large-v3
  device: auto               # auto | cuda | cpu
  compute_type: auto         # auto (=int8_float16 на GPU, int8 на CPU) | float16 | int8 | int8_float16
  # Батчевый инференс на GPU (3-4x быстрее). На 4 ГБ VRAM держи 4;
  # если вылетает out of memory — снизь до 2 или отключи (1).
  batch_size: 4
  # auto = Whisper сам определяет язык каждого видео. Это правильный режим,
  # когда среди доноров есть US-каналы: форсированный ru на английском аудио
  # даёт мусор. Если ВСЕ каналы русскоязычные — поставь ru, тогда включится
  # ещё и глоссарий (initial_prompt).
  # Тест казахского: python src/04_transcribe.py --language kk --video <id>
  language: auto
  # Глоссарий передаётся Whisper как initial_prompt ТОЛЬКО при language: ru —
  # заметно поднимает точность на профлексике. Дополняй по мере находок.
  glossary:
    tires:
      - шиномонтаж
      - развал-схождение
      - балансировка
      - протектор
      - шипованная резина
      - липучка
      - всесезонка
      - TPMS
      - датчик давления
      - индекс нагрузки
      - индекс скорости
      - боковой порез
      - грыжа на колесе
      - докатка
      - Michelin
      - Nokian
      - Continental
      - Bridgestone
      - Goodyear
      - Pirelli
      - Hankook
      - Kumho
      - Yokohama
      - Cordiant
      - Triangle
      - Viatti
    repair:
      - черновая отделка
      - чистовая отделка
      - стяжка пола
      - штукатурка
      - шпаклёвка
      - гипсокартон
      - натяжной потолок
      - ламинат
      - кварцвинил
      - керамогранит
      - затирка швов
      - санузел под ключ
      - разводка электрики
      - перепланировка
      - дизайн-проект
      - кухонный гарнитур
      - фартук
      - демонтаж

topics:
  # Сколько символов транскрипта отправлять в модель. На бесплатном Groq
  # есть лимиты и В ДЕНЬ, и В МИНУТУ (у llama-3.1-8b-instant всего 6000
  # токенов/мин — запрос целиком должен влезать). 6k символов хватает,
  # чтобы понять тему ролика.
  # Пайплайн перезапускаемый: упёрся в дневной лимит — продолжил завтра.
  max_chars: 6000
  clusters_min: 15
  clusters_max: 25

gap:
  search_results: 30         # ytsearchN на запрос
  top_clusters: 25           # сколько кластеров прогонять через gap-анализ
  chart_top: 15              # сколько тем на графике
  # Маркеры казахстанской привязки (заголовок/название канала).
  # Claude тоже классифицирует, маркеры — подсказка и страховка.
  kz_markers:
    - Казахстан
    - Казахстане
    - Қазақстан
    - Алматы
    - Алмате
    - Астана
    - Астане
    - Шымкент
    - Караганда
    - Актобе
    - Павлодар
    - Атырау
    - Тараз
    - тенге
    - ".kz"
    - KZ

briefs:
  count: 10
  min_per_vertical: 3
  # ужато под МИНУТНЫЙ лимит gpt-oss-120b (8000 токенов на весь запрос):
  # ~12k символов материалов ≈ 4.5k токенов входа + 3k на ответ
  max_chars_per_transcript: 4000
  max_total_chars: 10000
