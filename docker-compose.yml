services:
  pipeline:
    build: .
    env_file:
      - path: .env
        required: false        # ключ можно передать и через окружение
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
      # кэш модели Whisper (~3 ГБ), чтобы не скачивать при каждом запуске
      - whisper-cache:/root/.cache

volumes:
  whisper-cache:
